on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label or image"
        required: false
        type: string
        default: core
      working-directory:
        description: "Project directory where Cargo.toml and deny.toml are located"
        required: false
        type: string
        default: .
      deny-check-args:
        description: "Extra arguments passed to cargo deny check"
        required: false
        type: string
        default: ""
      enable_sccache:
        description: "Enable sccache automatically when it is available on the runner"
        required: false
        type: boolean
        default: true

name: Cargo Deny

jobs:
  cargo_deny:
    name: Cargo Deny
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Enable sccache
        if: ${{ inputs.enable_sccache }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null; then
            echo "RUSTC_WRAPPER=$(command -v sccache)" >> "$GITHUB_ENV"
          fi

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Ensure deny.toml exists
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          if [ ! -f deny.toml ]; then
            echo "::error file=deny.toml,title=Missing deny.toml::deny.toml is required. Add a deny.toml to this repository."
            exit 1
          fi

      - name: Run cargo-deny checks
        working-directory: ${{ inputs.working-directory }}
        run: cargo deny check ${{ inputs.deny-check-args }}
      - name: sccache stats
        if: ${{ always() && inputs.enable_sccache }}
        shell: bash
        run: |
          if command -v sccache >/dev/null; then
            sccache -s || true
          fi
