on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label or image'
        required: false
        type: string
        default: core
      make_target:
        description: 'Make target to execute'
        required: true
        type: string
      working-directory:
        description: 'Relative working directory that contains the Makefile'
        required: false
        type: string
        default: .
      rust_target:
        description: 'Optional Rust target'
        required: false
        type: string
      enable_sccache:
        description: 'Enable sccache automatically when it is available on the runner'
        required: false
        type: boolean
        default: true
      allow_fork_pr_on_core:
        description: 'Allow execution on fork pull_request events when using core runners'
        type: boolean
        required: false
        default: false

name: Make

permissions:
  contents: read

jobs:
  make:
    name: Run make target
    runs-on: ${{ inputs.runner }}
    if: ${{ inputs.runner != 'core' || inputs.allow_fork_pr_on_core || github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Add Rust tools to PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1
      - name: Enable sccache
        if: ${{ inputs.enable_sccache }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null; then
            echo "RUSTC_WRAPPER=$(command -v sccache)" >> "$GITHUB_ENV"
          fi
      - name: Install Optional Rust Target
        if: ${{ inputs.rust_target }}
        shell: bash
        env:
          RUST_TARGET: ${{ inputs.rust_target }}
        run: |
          set -euo pipefail
          if [[ ! "$RUST_TARGET" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid rust target '$RUST_TARGET'"
            exit 1
          fi
          rustup target add "$RUST_TARGET"
      - name: Validate Inputs
        shell: bash
        env:
          MAKE_TARGET: ${{ inputs.make_target }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          if [[ ! "$MAKE_TARGET" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "::error::Invalid make target '$MAKE_TARGET'"
            exit 1
          fi
          if [[ "$WORKING_DIRECTORY" == /* ]]; then
            echo "::error::Working directory must be relative"
            exit 1
          fi
          if [[ "$WORKING_DIRECTORY" =~ (^|/)\.\.(/|$) ]]; then
            echo "::error::Working directory must stay within the repository"
            exit 1
          fi
          if [[ ! -d "$WORKING_DIRECTORY" ]]; then
            echo "::error::Working directory '$WORKING_DIRECTORY' does not exist"
            exit 1
          fi
      - name: Execute Make Target
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          MAKE_TARGET: ${{ inputs.make_target }}
        run: |
          set -euo pipefail
          make "$MAKE_TARGET"
      - name: sccache stats
        if: ${{ always() && inputs.enable_sccache }}
        shell: bash
        run: |
          if command -v sccache >/dev/null; then
            sccache -s || true
          fi
